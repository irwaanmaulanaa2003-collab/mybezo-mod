name: Build Mybezo Mod
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build
      - name: Upload Mod JAR
        uses: actions/upload-artifact@v4
        with:
          name: Mybezo-Mod-JAR
          path: build/libs/*.jar
          
